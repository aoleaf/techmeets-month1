<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #f7fafc;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      transition: opacity 0.2s;
    }

    .task-item.done {
      opacity: 0.5;
    }

    .task-label {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      cursor: pointer;
      word-break: break-all;
      transition: text-decoration 0.15s;
    }

    .task-item.done .task-label {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      padding: 4px 10px;
      background: transparent;
      border: 1.5px solid #fc8181;
      color: #fc8181;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #fc8181;
      color: #fff;
    }

    .empty-msg {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 16px 0;
    }

    .task-count {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
      text-align: right;
    }

    .task-count span {
      font-weight: 600;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>
    <div class="input-row">
      <input type="text" id="task-input" placeholder="タスクを入力..." maxlength="100">
      <button id="add-btn">追加</button>
    </div>
    <p class="task-count" id="task-count"></p>
    <ul id="task-list"></ul>
  </div>

  <script>
    const tasks = [];

    const input = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const taskList = document.getElementById('task-list');
    const taskCount = document.getElementById('task-count');

    function render() {
      taskList.replaceChildren();

      const doneCount = tasks.filter(t => t.done).length;
      taskCount.replaceChildren();
      if (tasks.length > 0) {
        const prefix = document.createTextNode('完了 ');
        const badge = document.createElement('span');
        badge.textContent = `${doneCount} / ${tasks.length}`;
        const suffix = document.createTextNode(' 件');
        taskCount.append(prefix, badge, suffix);
      }

      if (tasks.length === 0) {
        const msg = document.createElement('p');
        msg.className = 'empty-msg';
        msg.textContent = 'タスクがありません';
        taskList.appendChild(msg);
        return;
      }

      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');

        const label = document.createElement('span');
        label.className = 'task-label';
        label.textContent = task.text;
        label.addEventListener('click', () => toggleDone(index));

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '削除';
        deleteBtn.addEventListener('click', () => deleteTask(index));

        li.appendChild(label);
        li.appendChild(deleteBtn);
        taskList.appendChild(li);
      });
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      input.value = '';
      render();
    }

    function toggleDone(index) {
      tasks[index].done = !tasks[index].done;
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      render();
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
