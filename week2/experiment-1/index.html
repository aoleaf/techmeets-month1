<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スライドショー</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      font-family: sans-serif;
    }

    .slideshow {
      text-align: center;
    }

    .slide {
      display: none;
    }

    .slide.active {
      display: block;
    }

    .slide img {
      display: block;
      max-width: 100%;
    }

    .slide p {
      margin: 12px 0 0;
      font-size: 16px;
      color: #333;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-top: 16px;
    }

    .controls button {
      padding: 8px 24px;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid #999;
      border-radius: 4px;
      background: #fff;
    }

    .controls button:hover {
      background: #e0e0e0;
    }

    .counter {
      font-size: 16px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="slideshow">
    <div class="slide active">
      <img src="https://placehold.jp/600x300.png" alt="スライド1">
      <p>スライド 1</p>
    </div>
    <div class="slide">
      <img src="https://placehold.jp/600x300.png" alt="スライド2">
      <p>スライド 2</p>
    </div>
    <div class="slide">
      <img src="https://placehold.jp/600x300.png" alt="スライド3">
      <p>スライド 3</p>
    </div>

    <div class="controls">
      <button id="prevBtn">前へ</button>
      <span class="counter" id="counter">1 / 3</span>
      <button id="nextBtn">次へ</button>
    </div>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const counter = document.getElementById('counter');
    let current = 0;

    function showSlide(index) {
      slides[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
      counter.textContent = (current + 1) + ' / ' + slides.length;
    }

    document.getElementById('prevBtn').addEventListener('click', function () {
      showSlide(current - 1);
    });

    document.getElementById('nextBtn').addEventListener('click', function () {
      showSlide(current + 1);
    });
  </script>

</body>
</html>
