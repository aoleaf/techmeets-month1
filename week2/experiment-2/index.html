<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      width: 400px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      padding: 40px 32px;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 16px;
    }

    .name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #222;
      margin: 0 0 8px;
    }

    .bio {
      font-size: 0.9rem;
      color: #666;
      margin: 0 0 24px;
      line-height: 1.6;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .badge {
      background: #eef0fb;
      color: #4a5bc7;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://placehold.jp/100x100.png" alt="avatar">
    <h1 class="name">山田 太郎</h1>
    <p class="bio">Webが好きなフロントエンドエンジニア。<br>シンプルで使いやすいUIを作ることが得意です。</p>
    <div class="badges">
      <span class="badge">HTML</span>
      <span class="badge">CSS</span>
      <span class="badge">JavaScript</span>
      <span class="badge">React</span>
      <span class="badge">Git</span>
    </div>
  </div>
</body>
</html>
